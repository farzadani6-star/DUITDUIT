<!DOCTYPE html>
<html lang="id">
<head>
  <link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#3b82f6">

<link rel="apple-touch-icon" href="icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DUITT DUITT</title>

  <link rel="stylesheet" href="style.css">

  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

<div class="container">
  <h1>💰 DUITT DUITT</h1>

  <!-- ================= FORM ================= -->
  <form id="form">
    <input type="text" id="ket" placeholder="Keterangan" required>

    <input type="text" id="jumlah" placeholder="Jumlah (Rp)" required>

   
    <select id="tipe">
  <option value="masuk">Pemasukan</option>
  <option value="keluar">Pengeluaran</option>
</select>

<select id="owner">
  <option value="">Pilih Pemilik</option>
  <option value="sulala">SULALA</option>
  <option value="surere">SURERE</option>
</select>

    <!-- KATEGORI -->
    <select id="kategori" style="display:none;">
      <option value="">Pilih Kategori</option>
      <option>Makanan</option>
      <option>Jajan</option>
      <option>Kebutuhan Rumah</option>
      <option>Laundry</option>
      <option>Foya-foya</option>
      <option>Belanja</option>
      <option>Transportasi</option>
      <option>Perbaikan</option>
      <option>Telekomunikasi</option>
      <option>Kos</option>
      <option>Utang</option>
    </select>

    <button type="submit">Tambah</button>
  </form>
    <!-- ================= SUMMARY ================= -->
<div class="summary-grid">
  <div class="box green">
    <span>Pemasukan</span>
    <h3 id="totalMasuk">Rp 0</h3>
  </div>

  <div class="box red">
    <span>Pengeluaran</span>
    <h3 id="totalKeluar">Rp 0</h3>
  </div>

  <div class="box blue">
    <span>Saldo</span>
    <h3 id="saldo">Rp 0</h3>
  </div>
</div>
  <!-- ==========================
       TAGIHAN STICKY
  ========================== -->
  <div class="tagihan-box">

    <h3>🧾 Tagihan</h3>

    <input type="text" id="tagihanNama" placeholder="Nama tagihan">
    <input type="date" id="tagihanTanggal">
    <input type="text" id="tagihanHarga" placeholder="Nominal (Rp)">

    <button onclick="addTagihan()">+ Tambah</button>

    <div id="tagihanBody" class="note-container"></div>

    <h4 style="margin-top:10px;">Harus Dibayar</h4>
    <div id="tagihanDone" class="note-container small"></div>

  </div>
  
<div class="keranjang">

  <!-- INPUT NAMA SAJA -->
  <input type="text" id="namaBelanja" placeholder="Nama Belanjaan">

  <button type="button" onclick="addCartItem()">+ Tambah Barang</button>
  <button type="button" onclick="saveCartToFinance()">Simpan Belanja</button>

  <table>
    <thead>
      <tr>
        <th>No</th>
        <th>List</th>
        <th>Harga</th>
        <th>✔</th>
        <th>Aksi</th>
      </tr>
    </thead>

    <tbody id="cartBody"></tbody>
  </table>

  <h3>Total Belanja: <span id="totalBelanja">Rp 0</span></h3>

</div>

  <div class="divider"></div>

  <!-- ================= TABEL ================= -->
  <div class="table-wrapper">
  <table>
    <thead>
      <tr>
        <th>No</th>
        <th>Keterangan</th>
        <th>Tipe</th>
        <th>Kategori</th>
        <th>Jumlah</th>
        <th>Aksi</th>
      </tr>
    </thead>
    <tbody id="tbody"></tbody>
  </table>
  </div>
<div class="chart-box">
  <h3>💰 Pemasukan SULALA vs SURERE</h3>
  <canvas id="ownerChart"></canvas>
</div>
  <!-- ================= CHART UTAMA ================= -->
  <div class="chart-box">
    <h3> Pemasukan vs Pengeluaran</h3>
    <canvas id="myChart"></canvas>
  </div>

  <!-- ================= CHART KATEGORI ================= -->
  <div class="chart-box">
    <h3> Pengeluaran per Kategori</h3>
    <canvas id="kategoriChart"></canvas>
  </div>
  
  <!-- ================= BOROS ================= -->
<div class="boros-box">
  <h3>🔥 Boros di:</h3>
  <div id="borosList"></div>
</div>


<!-- ================= CHART PEMASUKAN BULAN ================= -->
<div class="chart-box">
  <h3>📈 Pemasukan</h3>

  <div class="chart-toggle">
    <button onclick="setMode('bulan')" id="btnBulan">Bulanan</button>
    <button onclick="setMode('minggu')" id="btnMinggu">Mingguan</button>
  </div>

  <canvas id="bulanChart"></canvas>
</div>
<div>
    
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js"></script>
<button class="btn-export" onclick="exportPDF()">
  <svg class="icon" viewBox="0 0 24 24" fill="none">
    <path d="M12 3V14M12 14L8 10M12 14L16 10" 
      stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M4 17V19C4 19.5523 4.44772 20 5 20H19C19.5523 20 20 19.5523 20 19V17" 
      stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
  </svg>

  <span>Export PDF</span>
</button>
  </div>
</div>

<input 
  type="date" 
  id="datePickerHidden" 
  value="${currentDate}"
  style="
    position: fixed;
    bottom: 0;
    left: 0;
    opacity: 0;
    pointer-events: none;
  "
>

<div id="toast" class="toast"></div>
</body>
</html>
